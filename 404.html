<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#090d1a;color:#e8ecf4;font-family:'Inter',system-ui,sans-serif;text-align:center;padding:2rem}
.wrap{max-width:480px}
h1{font-size:6rem;font-weight:800;background:linear-gradient(135deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
p{margin:1rem 0 2rem;color:#94a3b8;font-size:1.1rem}
a{display:inline-block;padding:.75rem 2rem;background:#3b82f6;color:#fff;text-decoration:none;border-radius:8px;font-weight:600;transition:transform .2s,box-shadow .2s}
a:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(59,130,246,.3)}
</style>
</head>
<body>
<div class="wrap">
<h1>404</h1>
<p>The page you're looking for doesn't exist or has been moved.</p>
<a href="/vmware-upgrade-path/">Back to Upgrade Planner</a>
</div>
</body>
</html>
